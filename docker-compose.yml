version: '3.8'
services:
  db:
    image: mysql:8.0
    container_name: jiancha_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: jiancha_car_rental
      MYSQL_USER: jiancha
      MYSQL_PASSWORD: jianchapassword
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./implementations/backend/src/database/schema.sql:/docker-entrypoint-initdb.d/schema.sql

volumes:
  mysql_data:
